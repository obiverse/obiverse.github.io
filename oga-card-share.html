<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OGA PLASTIC — Share Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#000}
  body{
    width:1080px;height:1350px;margin:0 auto;
    background:
      radial-gradient(ellipse 55% 35% at 50% 18%, rgba(26,107,34,.18) 0%, transparent 65%),
      radial-gradient(ellipse 70% 40% at 50% 95%, rgba(26,107,34,.12) 0%, transparent 60%),
      linear-gradient(168deg, #04111e 0%, #0b1f38 50%, #0d2844 100%);
    font-family:'Barlow',sans-serif;
    color:#f0f6e8;
    display:flex;flex-direction:column;align-items:center;justify-content:space-between;
    padding:52px 60px 48px;
    position:relative;overflow:hidden;
  }
  body::before{
    content:"";position:absolute;inset:0;
    background-image:
      linear-gradient(45deg, transparent 48%, rgba(26,107,34,.035) 49%, rgba(26,107,34,.035) 51%, transparent 52%),
      linear-gradient(-45deg, transparent 48%, rgba(26,107,34,.035) 49%, rgba(26,107,34,.035) 51%, transparent 52%);
    background-size:44px 44px;
    opacity:.5;
  }

  .head{text-align:center;position:relative;z-index:2}
  .head h1{
    font-weight:800;font-size:38px;
    letter-spacing:.16em;
    color:#fff;text-transform:uppercase;
  }
  .head p{
    font-family:'Dancing Script',cursive;
    font-weight:700;font-style:italic;
    font-size:22px;letter-spacing:.03em;
    color:#a6dfa2;
    margin-top:6px;
  }

  .cards{display:flex;flex-direction:column;gap:32px;position:relative;z-index:2}
  .cards img{
    width:880px;height:auto;
    border-radius:10px;
    box-shadow:0 36px 90px rgba(0,0,0,.6), 0 6px 24px rgba(0,0,0,.45);
  }

  .foot{
    font-weight:600;
    font-size:16px;letter-spacing:.3em;text-transform:uppercase;
    color:rgba(166,223,162,.7);
    position:relative;z-index:2;text-align:center;
  }
  .foot b{color:#fff;font-weight:700}
</style>
</head>
<body>
  <div class="head">
    <h1>OGA PLASTIC</h1>
    <p>Innovating with Every Mold</p>
  </div>

  <div class="cards">
    <img src="oga-card-front.png" alt="Front">
    <img src="oga-card-back.png" alt="Back">
  </div>

  <div class="foot"><b>OGA PLASTIC</b> &nbsp; Manufacturing Nigeria Ltd</div>
</body>
</html>
